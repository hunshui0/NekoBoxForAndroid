name: Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择打包类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
    paths:
      - 'nb4a.properties'

jobs:
  libcore:
    name: Native Build (LibCore)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Golang Status
        run: find buildScript libcore/*.sh | xargs cat | sha1sum > golang_status

      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status

      - name: LibCore Cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}

      - name: Install Golang
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ^1.25
          cache-dependency-path: libcore/go.mod

      - name: Native Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib core

  build:
    name: Build OSS APK
    runs-on: ubuntu-latest
    needs:
      - libcore

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Golang Status
        run: find buildScript libcore/*.sh | xargs cat | sha1sum > golang_status

      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status

      - name: LibCore Cache
        uses: actions/cache@v5
        with:
          path: |
            app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}

      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: ~/.gradle
          key: gradle-oss-${{ hashFiles('**/*.gradle.kts') }}

      - name: Gradle Build
        env:
          BUILD_PLUGIN: none
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          ALIAS_NAME: ${{ secrets.ALIAS_NAME }}
          ALIAS_PASS: ${{ secrets.ALIAS_PASS }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/25.0.8775105" >> local.properties

          ./run init action gradle

          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi

          echo "Current build type: $BUILD_TYPE"

          if [ "$BUILD_TYPE" = "release" ]; then
            if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
              echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
            fi

            ./gradlew app:assembleOssRelease
          else
            ./gradlew app:assembleOssDebug
          fi

          APK_DIR=$(dirname "$(find app/build/outputs/apk -name '*.apk' | head -n 1)")
          echo "APK=$APK_DIR" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: NekoBox-${{ github.event.inputs.build_type || 'debug' }}
          path: ${{ env.APK }}
